  const isSecondTap=pendingNodeClick&&pendingNodeClick.id===node.id&&now-pendingNodeClick.time<DOUBLE_TAP_DELAY;
  if(isSecondTap){
    clearPendingNodeClick();
    openNodeSubNet(node);
    return;
  }
  clearPendingNodeClick();
  pendingNodeClick={id:node.id,time:now,timer:setTimeout(function(){

  },DOUBLE_TAP_DELAY)};
});

      formatter:function(p){
        if(p.dataType==='node'){const d=p.data;
          if(d.isCenter)return `<div style="font-size:15px;font-weight:700;color:#fff;">${centerNode.name}</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;">${centerNode.sub} · ${centerNode.year}</div><div style="margin-top:6px;border-top:1px solid #3a4a5a;padding-top:6px;font-size:11px;color:#fbbf24;">← 双击此节点展开该政策网络</div>`;
          const nm=d.name.replace(/ /g,' ');let h=`<div style="font-size:14px;font-weight:600;color:#fff;">${nm}</div><div style="font-size:11px;color:#94a3b8;margin-top:2px;">${d.dept||''} · ${d.yr||''} · ${d.type||''}</div>`;
          if(d.d)h+=`<div style="margin:6px 0;border-top:1px solid #3a4a5a;padding-top:6px;"><div style="font-size:12px;color:#e2e8f0;">${d.d}</div></div>`;
          if(d.zz)h+=`<div style="padding:8px 10px;background:rgba(251,191,36,0.08);border-left:3px solid #fbbf24;border-radius:4px;"><span style="font-size:11px;font-weight:600;color:#fbbf24;">⏳ 转转视角</span><div style="font-size:12px;color:#fef3c7;margin-top:3px;">${d.zz}</div></div>`;
          h+=`<div style="margin-top:6px;font-size:11px;color:#7dd3fc;">↗ 单击跳转原文</div>`;return h;
        }return`<div style="font-size:12px;color:#e2e8f0;">${p.data.label||''}</div>`;
      }},
    series:[{type:'graph',layout:'none',symbol:'roundRect',
      symbolSize:function(v,p){return p.data.isCenter?[170,50]:[190,52]},
      label:{show:true,position:'inside',
        formatter:function(p){if(p.data.isCenter)return`{n|${centerNode.name}}`;const d=p.data;const nm=d.name.length>16?d.name.slice(0,15)+'…':d.name;return`{n|${nm}}\n{yr|${d.dept||''} ${d.yr||''}}`;},
        rich:{n:{fontSize:10,fontWeight:600,color:'#fff',lineHeight:15,textShadow:'0 1px 2px rgba(0,0,0,0.25)'},yr:{fontSize:9,color:'rgba(255,255,255,0.5)',lineHeight:12}},
        textPadding:[3,5,2,5]},
      edgeLabel:{show:true,rotate:0,formatter:p=>p.data.label||'',color:'#37474f',backgroundColor:'rgba(255,255,255,0.9)',padding:[1,5],borderRadius:6,fontSize:10,fontWeight:500,borderColor:'rgba(0,0,0,0.04)',borderWidth:1},
      edgeSymbol:['none','arrow'],edgeSymbolSize:[0,9],
      data:allNodes,links:links,lineStyle:{curveness:0.03}
    }]
  });
  subChart.on('click',p=>{if(p.dataType==='node'&&p.data.link&&!p.data.isCenter)window.open(p.data.link,'_blank');});
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');if(subChart){setTimeout(()=>{subChart.dispose();subChart=null;},300);}}
document.getElementById('modalCloseBtn').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
(function(){const tb=document.getElementById('fileListBody');[...NODES].sort((a,b)=>a.y-b.y).forEach((p,i)=>{const tr=document.createElement('tr');const f=p.id==='10'?' <span class="badge-new">🆕7月</span>':'';tr.innerHTML=`<td class="col-num">${i+1}</td><td class="col-stage" style="color:${p.color}">${p.stage}</td><td class="col-doc"><a href="${p.link}" target="_blank">${p.name}</a>${f}</td><td class="col-name">${p.sub}</td><td class="col-time">${p.year}</td><td class="col-link"><a href="${p.link}" target="_blank" class="link-btn">原文</a></td>`;tb.appendChild(tr);});})();
</script>
</body>
</html>
