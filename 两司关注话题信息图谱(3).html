// ===== BUILD SUB-GRAPH (shared) =====
function buildSubGraph(dom,topic,w,h){
  var srcs=topic.srcs.slice(0,6);
  var cx=w/2, cy=h/2-4, r=Math.min(w,h)*0.42;
  var sn=[{id:'c0',name:topic.name.replace(/\n/g,' ').slice(0,10),x:cx,y:cy,isC:true,
    itemStyle:{color:topic.color,shadowBlur:14,borderColor:'rgba(255,255,255,0.4)',borderWidth:2}}];
  srcs.forEach(function(s,i){
    var a=i/srcs.length*2*Math.PI-Math.PI/2;
    var lbl=s.n.length>7?s.n.slice(0,6)+'..':s.n;
    var cc=s.t==='p'?'#1e3a5f':s.t==='m'?'#a16207':'#6b5c9c';
    sn.push({id:'n'+i,name:lbl,x:cx+r*Math.cos(a),y:cy+r*Math.sin(a),_s:s,
      itemStyle:{color:cc,borderColor:'rgba(255,255,255,0.6)',borderWidth:1.5,shadowBlur:6}});
  });
  var sl=srcs.map(function(_,i){return{source:'c0',target:'n'+i,lineStyle:{color:'#90a4ae',width:1.2,curveness:0.02,opacity:0.6}};});
  var ch=echarts.init(dom);
  ch.setOption({
    backgroundColor:'transparent',
    tooltip:{trigger:'item',enterable:false,confine:true,
      backgroundColor:'rgba(30,40,50,0.96)',borderColor:'#3a4a5a',borderWidth:1,
      padding:[10,14],textStyle:{color:'#fff',fontSize:11},
      extraCssText:'border-radius:6px;max-width:400px;line-height:1.5;',
      formatter:function(p){
        if(p.data.isC) return'<b>'+topic.name.replace(/\n/g,' ')+'</b><br><span style="font-size:10px;color:#94a3b8;">关系图谱中心</span>';
        var s=p.data._s;if(!s)return'';
        var lb=s.t==='p'?'政策':s.t==='m'?'会议':'活动';
        return'<b style="font-size:12px;">['+lb+'] '+s.n+'</b><br><span style="font-size:11px;color:#94a3b8;">'+s.by+' - '+s.dt+'</span><br><span style="font-size:11px;color:#e2e8f0;">'+s.ex.replace(/<mark>/g,'<b style="background:#fbbf24;color:#1a2530;padding:0 2px;border-radius:2px">').replace(/<\/mark>/g,'</b>')+'</span>';
      }},
    series:[{type:'graph',layout:'none',
      symbol:'roundRect',
      symbolSize:function(v,p){return p.data.isC?[90,24]:[90,30];},
      label:{show:true,position:'inside',
        formatter:function(p){
          if(p.data.isC) return'{n|'+topic.name.replace(/\n/g,' ').slice(0,8)+'}';
          return'{n|'+p.data.name+'}\n{t|'+(p.data._s.t==='p'?'政策':p.data._s.t==='m'?'会议':'活动')+'}';
        },
        rich:{n:{fontSize:8,fontWeight:600,color:'#fff',lineHeight:10},t:{fontSize:7,color:'rgba(255,255,255,0.5)',lineHeight:8}},
        textPadding:[2,2,1,2]},
      edgeSymbol:['none','arrow'],edgeSymbolSize:[0,5],
      data:sn,links:sl,lineStyle:{curveness:0.02},
      animationDuration:500,roam:false
    }]
  });
  return ch;
}

// ===== HOVER CARD =====
var subChart=null,hcTimer=null,hc=document.getElementById('hc');
function showHC(id,cx,cy){
  if(hcTimer){clearTimeout(hcTimer);hcTimer=null;}
  var t=T[id];if(!t)return;
  document.getElementById('hcTitle').textContent=t.name.replace(/\n/g,' ');
  document.getElementById('hcTags').innerHTML=t.tags.map(function(x){return'<span>'+x+'</span>';}).join('');
  document.getElementById('hcIntro').textContent=t.intro;
  if(subChart){subChart.dispose();subChart=null;}
  var dom=document.getElementById('subChart');
  var w=Math.max(dom.clientWidth||580,580),h=Math.max(dom.clientHeight||290,290);
  subChart=buildSubGraph(dom,t,w,h);
  hc.classList.add('open');
  if(window.innerWidth>760){
    hc.style.left=Math.max(10,Math.min(cx,window.innerWidth-660))+'px';
    hc.style.top=Math.max(10,Math.min(cy,window.innerHeight-380))+'px';
    hc.style.bottom='auto';hc.style.right='auto';
  }
}
function hideHC(delay){
  if(delay===undefined)delay=300;
  hcTimer=setTimeout(function(){hc.classList.remove('open');if(subChart){subChart.dispose();subChart=null;}},delay);
}
chart.on('mouseover',function(p){
  if(p.data&&p.data._raw){
    if(hcTimer){clearTimeout(hcTimer);hcTimer=null;}
    var ev=p.event;var cx=60,cy=60;
    if(ev&&ev.offsetX!=null){cx=ev.offsetX+30;cy=ev.offsetY+30;}
    showHC(p.data._raw.id,cx,cy);
  }
});
chart.on('mouseout',function(){hideHC(400);});
hc.addEventListener('mouseenter',function(){if(hcTimer){clearTimeout(hcTimer);hcTimer=null;}});
hc.addEventListener('mouseleave',function(){hideHC(300);});

var ct=null;
chart.on('click',function(p){
  if(p.data&&p.data._raw){
    if(ct){clearTimeout(ct);ct=null;return;}
    ct=setTimeout(function(){hc.classList.remove('open');openDoc(p.data._raw.id);ct=null;},200);
  }
});

// ===== CLOUD DOC =====
var docSubChart=null;
function openDoc(id){
  var t=T[id];if(!t)return;
  document.getElementById('docTitle').textContent=t.name.replace(/\n/g,' ')+' - 云文档';
  document.getElementById('docSubLabel').textContent=CL[t.cat]+' | '+t.tags.join(' ');
  document.getElementById('docShell').classList.add('open');

  // Annotations
  var ann='';
  t.srcs.forEach(function(s,i){
    var bc=s.t==='p'?'policy':s.t==='m'?'meeting':'activity';
    var bl=s.t==='p'?'政策':s.t==='m'?'会议':'活动';
    var cc=s.t==='p'?'#1e3a5f':s.t==='m'?'#a16207':'#6b5c9c';
    ann+='<div class="ann-item"><div class="ann-num" style="background:'+cc+'">'+(i+1)+'</div><div class="ann-body"><span class="badge '+bc+'">'+bl+'</span> <span class="src">'+s.n+'</span><span class="date"> | '+s.by+' | '+s.dt+'</span><div class="txt">'+s.ex+'</div><a class="lk" target="_blank" href="'+s.u+'">-> 查看原文</a></div></div>';
  });

  // Ref list
  var rm={},rl=[];
  t.srcs.forEach(function(s){if(!rm[s.u]){rm[s.u]=true;rl.push({n:s.n,u:s.u});}});
  var rlHtml='<ul class="ref-list">';rl.forEach(function(r){rlHtml+='<li><a target="_blank" href="'+r.u+'">'+r.n+'</a></li>';});rlHtml+='</ul>';

  // Set innerHTML
  document.getElementById('docBody').innerHTML =
    '<section class="doc-sec"><div class="tag-row">'+t.tags.map(function(x){return'<span>'+x+'</span>';}).join('')+'</div></section>'+
    '<section class="doc-sec"><h3>话题简介</h3><p>'+t.intro+'</p></section>'+
    '<section class="doc-sec" id="graphSec"><h3>政策-会议-活动关系图谱</h3><div class="doc-graph-layout"><div class="doc-graph" id="graphContainer"></div><div class="doc-annotations">'+ann+'</div></div></section>'+
    '<section class="doc-sec"><h3>全部参考链接</h3>'+rlHtml+'</section>';

  // Create #docSub and init ECharts
  var container=document.getElementById('graphContainer');
  if(!container)return;
  if(docSubChart){docSubChart.dispose();docSubChart=null;}
  var subDiv=document.createElement('div');
  subDiv.id='docSub';
  subDiv.style.cssText='width:100%;height:290px;';
  container.appendChild(subDiv);
  // requestAnimationFrame ensures layout is done
  requestAnimationFrame(function(){
    var w=subDiv.offsetWidth||container.offsetWidth-10||400;
    var h=subDiv.offsetHeight||290;
    docSubChart=buildSubGraph(subDiv,t,w,h);
  });
}
